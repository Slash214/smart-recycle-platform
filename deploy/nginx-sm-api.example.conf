# 示例：小程序 API 经域名 /sm/v1/ 反代到 Node Fastify /api/v1/
# 部署：复制到 server {} 内，改域名与证书路径；nginx -t && nginx -s reload
#
# 前端约定：BASE_URL = https://你的域名/sm
# 请求示例：https://域名/sm/v1/mini/site-config -> 后端 http://127.0.0.1:3100/api/v1/mini/site-config

# 若 http {} 里未定义，可先注释掉下面两行限流，或按需在 http 块增加：
# limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
# limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;

# ---------- 推荐：只代理 API（与小程序 BASE_URL=/sm + 路径 /v1/... 对齐）----------
location /sm/v1/ {
    # limit_req zone=api_limit burst=20 nodelay;
    # limit_conn conn_limit_per_ip 20;

    proxy_pass http://127.0.0.1:3100/api/v1/;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 上传图片等（与 Fastify multipart 10MB 对齐，可按需加大）
    client_max_body_size 12m;

    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # 无 WebSocket 可删下面两行
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
}

# 若管理端 / 其他静态也走同域名，保留你原来的 location /
# location / {
#     try_files $uri $uri/ /index.html;
# }

# ---------- 可选：http {} 里增加 WebSocket 升级映射（仅当上面用了 Upgrade）----------
# map $http_upgrade $connection_upgrade {
#     default upgrade;
#     ''      close;
# }
